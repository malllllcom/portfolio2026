<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHIHCHEN HUANG — THE MEDIEVAL ZINE</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 左側導航選單 (極簡、細字體、藍底隱藏文字) */
        .side-nav {
            position: fixed; 
            left: 30px; 
            top: 7.5vh; 
            z-index: 10000;
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-weight: 400; 
            font-size: 15px; 
            letter-spacing: 0.5px;
        }
        .side-nav a {
            text-decoration: none; 
            color: #0000FF; 
            padding: 0; 
            line-height: 1; 
            align-self: flex-start; 
            transition: none; 
        }
        .side-nav a:hover {
            background-color: #0000FF; 
            color: #0000FF; 
        }

        /* 終極白邊修復與實體圖層 */
        .page { background-color: transparent !important; box-shadow: none !important; }
        /* 針對那兩頁沒有圖片的內頁，強制補回紙張的米白色與一點點內陰影 */
        .blank-page { background-color: #fdfcf7 !important; box-shadow: inset 0 0 20px rgba(0,0,0,0.05) !important; }

        .base-img, .tracing-wrapper { width: 100.8%; height: 100.8%; top: -0.4%; left: -0.4%; object-fit: cover; }
        .page-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; mix-blend-mode: multiply; }

        /* 右側膠囊工具列 */
        .material-palette {
            position: fixed; right: 30px; top: 50%; transform: translateY(-50%); 
            z-index: 10000; display: flex; flex-direction: column; gap: 20px;
            background: rgba(240, 238, 235, 0.65); padding: 24px 12px; 
            border-radius: 50px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.08); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .material-btn {
            width: 40px; height: 40px; cursor: pointer; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.3, 1); opacity: 0.4;
        }
        .material-btn svg { width: 20px; height: 20px; fill: none; stroke: #1a1a1a; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .material-btn:hover { transform: translateX(-3px) scale(1.1); opacity: 0.8; background: rgba(255,255,255,0.5); }
        .material-btn.active { opacity: 1; background: #1a1a1a; transform: translateX(-3px) scale(1.1); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .material-btn.active svg { stroke: #f4f1ea; }
        .material-btn.trash:hover { background: #d9453b; opacity: 1; }
        .material-btn.trash:hover svg { stroke: #fff; }

        /* 手機版自適應 */
        @media (max-width: 800px) {
            .book { width: 95vw; height: auto; max-height: 70vh; } 
            .side-nav { top: 15px; left: 15px; font-size: 14px; gap: 8px; }
            .material-palette {
                right: 50%; top: auto; bottom: 20px; transform: translateX(50%);
                flex-direction: row; padding: 12px 24px; gap: 15px;
            }
            .material-btn:hover, .material-btn.active { transform: translateY(-3px) scale(1.1); }
        }
    </style>
</head>
<body>

    <nav class="side-nav">
        <a href="info.html">INFO</a>
        <a href="moving-image.html">MOVING IMAGE</a>
        <a href="index.html">ZINE</a>
    </nav>

    <div class="book-scene">
        <div class="book" id="zine-book">
            <div class="leaf"><div class="page front"><img src="image/cover.jpg" class="base-img" alt="封面"></div><div class="page back blank-page"></div></div>
            <div class="leaf"><div class="page front"><img src="image/page1.jpg" class="base-img" alt="Page 1"></div><div class="page back"><img src="image/page2.jpg" class="base-img" alt="Page 2"><div class="tracing-wrapper bound-left"><div class="tracing-texture"></div><img src="image/page3.png" class="tracing-img" alt="Page 3"><div class="tracing-gloss"></div></div></div></div>
            <div class="leaf"><div class="page front"><img src="image/page5.jpg" class="base-img" alt="Page 5"><div class="tracing-wrapper bound-right"><div class="tracing-texture"></div><img src="image/page4.png" class="tracing-img" alt="Page 4"><div class="tracing-gloss"></div></div></div><div class="page back"><img src="image/page6.jpg" class="base-img" alt="Page 6"></div></div>
            <div class="leaf"><div class="page front"><img src="image/page7.jpg" class="base-img" alt="Page 7"></div><div class="page back"><img src="image/page8.jpg" class="base-img" alt="Page 8"></div></div>
            <div class="leaf"><div class="page front"><img src="image/page9.jpg" class="base-img" alt="Page 9"></div><div class="page back"><img src="image/page10.jpg" class="base-img" alt="Page 10"></div></div>
            <div class="leaf"><div class="page front"><img src="image/page11.jpg" class="base-img" alt="Page 11"></div><div class="page back"><img src="image/page12.jpg" class="base-img" alt="Page 12"></div></div>
            <div class="leaf"><div class="page front"><img src="image/page13.jpg" class="base-img" alt="Page 13"></div><div class="page back"><img src="image/page14.jpg" class="base-img" alt="Page 14"></div></div>
            <div class="leaf"><div class="page front"><img src="image/page15.jpg" class="base-img" alt="Page 15"></div><div class="page back"><img src="image/page16.jpg" class="base-img" alt="Page 16"></div></div>
            <div class="leaf"><div class="page front"><img src="image/page17.jpg" class="base-img" alt="Page 17"></div><div class="page back"><img src="image/page18.jpg" class="base-img" alt="Page 18"></div></div>
            <div class="leaf"><div class="page front"><img src="image/page19.jpg" class="base-img" alt="Page 19"></div><div class="page back"><img src="image/page20.jpg" class="base-img" alt="Page 20"></div></div>
            <div class="leaf"><div class="page front"><img src="image/page21.jpg" class="base-img" alt="Page 21"></div><div class="page back"><img src="image/page22.jpg" class="base-img" alt="Page 22"></div></div>
            <div class="leaf"><div class="page front"><img src="image/page23.jpg" class="base-img" alt="Page 23"></div><div class="page back"><img src="image/page24.jpg" class="base-img" alt="Page 24"></div></div>
            <div class="leaf"><div class="page front"><img src="image/page25.jpg" class="base-img" alt="Page 25"></div><div class="page back"><img src="image/page26.jpg" class="base-img" alt="Page 26"></div></div>
            <div class="leaf"><div class="page front blank-page"></div><div class="page back"><img src="image/backcover.jpg" class="base-img" alt="封底"></div></div>
        </div>
    </div>

    <div class="material-palette">
        <div id="tool-none" class="material-btn" onclick="setZineTool('none')" title="翻閱模式"><svg viewBox="0 0 24 24"><path d="M18 8a2 2 0 1 0-4 0v5.6L12.5 12a2.3 2.3 0 0 0-3.3 0 2.4 2.4 0 0 0 0 3.4l5.3 5.3c.8.8 2 1.3 3.2 1.3H19a4 4 0 0 0 4-4v-7a2 2 0 1 0-4 0v2"/></svg></div>
        <div id="tool-pen" class="material-btn active" onclick="setZineTool('pen')" title="碳粉筆"><svg viewBox="0 0 24 24"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg></div>
        <div id="tool-eraser" class="material-btn" onclick="setZineTool('eraser')" title="橡皮擦"><svg viewBox="0 0 24 24"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg></div>
        <div class="material-btn trash" onclick="clearCanvas()" title="撕除重置"><svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const leaves = document.querySelectorAll('.leaf');
            let totalLeaves = leaves.length;

            leaves.forEach((leaf, index) => {
                leaf.style.zIndex = totalLeaves - index;
                leaf.addEventListener('click', function(e) {
                    if (window.isDrawingMode) return; 
                    if (this.classList.contains('flipped')) {
                        this.classList.remove('flipped');
                        setTimeout(() => { this.style.zIndex = totalLeaves - index; }, 400); 
                    } else {
                        this.classList.add('flipped');
                        setTimeout(() => { this.style.zIndex = index + 1; }, 400);
                    }
                });
            });

            window.currentTool = 'pen'; 
            window.isDrawingMode = true; 
            let isDrawing = false;
            let lastX = 0, lastY = 0;

            function randomGaussian(mean = 0, stdev = 1) {
                let u = 1 - Math.random(), v = Math.random();
                let z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
                return z * stdev + mean;
            }

            const pages = document.querySelectorAll('.page');
            pages.forEach(page => {
                const canvas = document.createElement('canvas');
                canvas.className = 'page-canvas';
                page.appendChild(canvas);
                const ctx = canvas.getContext('2d');

                const resizeCanvas = () => {
                    canvas.width = page.offsetWidth * 2;
                    canvas.height = page.offsetHeight * 2;
                    ctx.scale(2, 2);
                };
                setTimeout(resizeCanvas, 100);
                window.addEventListener('resize', resizeCanvas);

                canvas.addEventListener('mousedown', (e) => {
                    if (window.currentTool === 'none') return;
                    isDrawing = true; lastX = e.offsetX; lastY = e.offsetY;
                });

                canvas.addEventListener('mousemove', (e) => {
                    if (!isDrawing || window.currentTool === 'none') return;
                    const x = e.offsetX, y = e.offsetY;

                    if (window.currentTool === 'pen') {
                        ctx.globalCompositeOperation = 'source-over';
                        ctx.fillStyle = 'rgba(25, 25, 25, 0.4)'; 
                        const speed = Math.hypot(x - lastX, y - lastY);
                        const particleCount = Math.max(2, 12 - speed * 0.15); 
                        for (let step = 0; step <= 1; step += 0.1) {
                            let lerpX = lastX + (x - lastX) * step; let lerpY = lastY + (y - lastY) * step;
                            for (let i = 0; i < particleCount; i++) {
                                let offsetX = randomGaussian(0, 1.8); let offsetY = randomGaussian(0, 1.8);
                                let pSize = Math.random() * 1.5 + 0.5;
                                ctx.beginPath(); ctx.arc(lerpX + offsetX, lerpY + offsetY, pSize, 0, Math.PI * 2); ctx.fill();
                            }
                        }
                    } else if (window.currentTool === 'eraser') {
                        ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 30; ctx.lineCap = 'round';
                        ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
                    }
                    lastX = x; lastY = y;
                });

                canvas.addEventListener('mouseup', () => isDrawing = false);
                canvas.addEventListener('mouseleave', () => isDrawing = false);
            });

            window.setZineTool = (tool) => {
                window.currentTool = tool; window.isDrawingMode = (tool !== 'none');
                document.querySelectorAll('.page-canvas').forEach(canvas => { canvas.style.pointerEvents = tool === 'none' ? 'none' : 'auto'; });
                document.body.style.cursor = tool === 'none' ? 'default' : (tool === 'pen' ? 'crosshair' : 'cell');
                document.querySelectorAll('.material-btn').forEach(btn => btn.classList.remove('active'));
                let activeBtn = document.getElementById(`tool-${tool}`);
                if (activeBtn) activeBtn.classList.add('active');
            };

            window.clearCanvas = () => {
                document.querySelectorAll('.page-canvas').forEach(canvas => {
                    const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height);
                });
            };

            setZineTool('pen');
        });
    </script>
</body>
</html>
